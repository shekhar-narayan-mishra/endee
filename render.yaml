# Render Infrastructure as Code
# ─────────────────────────────────────────────────────────────────────────────
# This file defines the services Render will create when you connect your repo.
#
# IMPORTANT — Endee Vector DB:
#   Render's free tier does NOT support custom Docker images.
#   Use one of these options:
#     Option A (Recommended): Endee Cloud → https://endee.io
#                             Sign up → copy your endpoint URL → set ENDEE_HOST below.
#     Option B: Self-hosted Endee on a VPS (DigitalOcean, AWS EC2, etc.),
#               then set ENDEE_HOST to that server's URL.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Main Web Service: FastAPI + Gradio ────────────────────────────────────
  - type: web
    name: ai-doc-search
    runtime: python
    region: singapore       # change to: oregon, frankfurt, ohio, virginia
    plan: free              # upgrade to starter for always-on

    # Build
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    # Start — Render injects $PORT automatically
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    # Health check (Render pings this to confirm the service is live)
    healthCheckPath: /health

    envVars:
      # ── LLM ────────────────────────────────────────────────────────────────
      - key: LLM_PROVIDER
        value: gemini            # or: openai

      - key: GEMINI_API_KEY
        sync: false              # you will enter this in the Render dashboard

      - key: OPENAI_API_KEY
        sync: false              # only needed if LLM_PROVIDER=openai

      # ── Endee Vector DB ────────────────────────────────────────────────────
      - key: ENDEE_HOST
        sync: false              # set to your Endee cloud URL, e.g. https://xxx.endee.io

      # ── CORS ───────────────────────────────────────────────────────────────
      # After deploy, replace * with your Render app URL for production security
      - key: CORS_ORIGINS
        value: "*"
